<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Mart || Popular Products</title>
    <style>
      /* ── App loader — shown before React mounts, replaced automatically ── */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
        animation: loader-fadein 0.3s ease;
      }
      @keyframes loader-fadein {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .loader-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* Brand logo mark */
      .loader-emblem {
        width: 68px;
        height: 68px;
        background: #00622e;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 8px 28px rgba(0, 98, 46, 0.25);
        animation: loader-pulse 1.6s ease-in-out infinite;
      }
      @keyframes loader-pulse {
        0%, 100% { transform: scale(1);    box-shadow: 0 8px 28px rgba(0,98,46,0.25); }
        50%       { transform: scale(1.06); box-shadow: 0 12px 36px rgba(0,98,46,0.35); }
      }
      .loader-emblem-e {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 34px;
        font-weight: 900;
        color: #daed35;
        line-height: 1;
        letter-spacing: -1px;
        user-select: none;
      }

      /* Brand name */
      .loader-brand {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #001a0c;
        letter-spacing: -0.3px;
        margin-bottom: 4px;
        user-select: none;
      }
      .loader-brand span {
        color: #00622e;
      }

      /* Tagline */
      .loader-tagline {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11.5px;
        font-weight: 500;
        color: #808080;
        letter-spacing: 0.5px;
        margin-bottom: 28px;
        user-select: none;
      }

      /* Spinner ring */
      .loader-ring {
        width: 38px;
        height: 38px;
        border: 3px solid #e4e4e4;
        border-top-color: #00622e;
        border-radius: 50%;
        animation: loader-spin 0.75s linear infinite;
      }
      @keyframes loader-spin {
        to { transform: rotate(360deg); }
      }

      /* Dots row below spinner */
      .loader-dots {
        display: flex;
        gap: 6px;
        margin-top: 20px;
      }
      .loader-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #00622e;
        opacity: 0.25;
        animation: loader-dot 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes loader-dot {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
        40%            { opacity: 1;   transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen — React mount replaces this automatically -->
      <div id="app-loader">
        <div class="loader-box">
          <div class="loader-emblem">
            <span class="loader-emblem-e">E</span>
          </div>
          <p class="loader-brand">Elite<span>Mart</span></p>
          <p class="loader-tagline">Fresh Groceries, Delivered Fast</p>
          <div class="loader-ring"></div>
          <div class="loader-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
